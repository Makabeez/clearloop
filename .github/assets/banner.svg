<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0E1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.88" cy="0.08" r="0.7">
      <stop offset="0" stop-color="#1a2a48" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0B1220" stop-opacity="0"/>
    </radialGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7C86FF"/>
    </marker>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow)"/>

  <text x="72" y="60" font-size="17" letter-spacing="6" fill="#7C86FF" font-family="'IBM Plex Mono', monospace">CLEARLOOP</text>

  <g font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="600">
    <rect x="72" y="78" width="70" height="26" rx="13" fill="#12203a" stroke="#35C2A5"/>
    <text x="107" y="95" fill="#35C2A5" text-anchor="middle">DeFi</text>
    <rect x="150" y="78" width="150" height="26" rx="13" fill="#1a1830" stroke="#7C86FF"/>
    <text x="225" y="95" fill="#9aa2ff" text-anchor="middle">Agentic Economy</text>
  </g>

  <text x="70" y="182" font-size="58" font-weight="700" fill="#E7ECF6" letter-spacing="-1.4">Settle the net,</text>
  <text x="70" y="244" font-size="58" font-weight="700" fill="#E7ECF6" letter-spacing="-1.4">not the gross.</text>
  <text x="74" y="292" font-size="18" fill="#8A96AE" font-family="'IBM Plex Mono', monospace">Multilateral clearing for the agent economy &#183; Arc &#183; USDC</text>

  <g font-family="'IBM Plex Mono', monospace">
    <text x="648" y="150" font-size="15" fill="#8A96AE">gross <tspan fill="#E8A33D">$16</tspan>  &#8594;  net <tspan fill="#7C86FF">$5.5</tspan></text>
    <text x="648" y="180" font-size="15" fill="#8A96AE">200 payments &#8594; 14 settlements</text>
    <text x="646" y="232" font-size="32" font-weight="700" fill="#7C86FF" font-family="'Segoe UI', sans-serif">88.8% capital freed</text>
  </g>

  <g transform="translate(1138,172)">
    <g stroke="#4C5B78" stroke-width="1.3" fill="none" stroke-opacity="0.5">
      <path d="M0,-104 Q0,-6 90,52"/>
      <path d="M90,52 Q0,8 -90,52"/>
      <path d="M-90,52 Q0,-6 0,-104"/>
      <path d="M0,-104 Q34,-8 -90,52"/>
      <path d="M90,52 Q0,-16 0,-104"/>
    </g>
    <g stroke="#7C86FF" stroke-width="2.3" fill="none" stroke-linecap="round">
      <path d="M0,-100 Q34,-16 86,48" marker-end="url(#ah)"/>
      <path d="M-86,50 Q0,16 82,50" marker-end="url(#ah)"/>
    </g>
    <circle cx="0" cy="-104" r="12" fill="#E8A33D"/>
    <circle cx="90" cy="52" r="12" fill="#35C2A5"/>
    <circle cx="-90" cy="52" r="12" fill="#35C2A5"/>
  </g>
</svg>
